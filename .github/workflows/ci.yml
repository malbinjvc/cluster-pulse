name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and dependencies
        run: |
          apk add --no-cache lua5.4 lua5.4-dev luarocks5.4 gcc musl-dev zlib-dev
          luarocks-5.4 install lzlib ZLIB_INCDIR=/usr/include ZLIB_LIBDIR=/usr/lib
          luarocks-5.4 install pegasus
          luarocks-5.4 install dkjson
          luarocks-5.4 install luaunit

      - name: Run tests
        run: lua5.4 tests/test_cluster_pulse.lua

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cluster-pulse .
