name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 liblua5.4-dev luarocks zlib1g-dev
          sudo luarocks install pegasus
          sudo luarocks install dkjson
          sudo luarocks install luaunit

      - name: Run tests
        run: |
          export LUA_PATH="/usr/local/share/lua/5.4/?.lua;/usr/local/share/lua/5.4/?/init.lua;$(lua5.4 -e 'print(package.path)')"
          export LUA_CPATH="/usr/local/lib/lua/5.4/?.so;$(lua5.4 -e 'print(package.cpath)')"
          lua5.4 tests/test_cluster_pulse.lua

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cluster-pulse .
