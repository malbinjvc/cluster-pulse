name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 liblua5.4-dev luarocks zlib1g-dev
          sudo luarocks install pegasus
          sudo luarocks install dkjson
          sudo luarocks install luaunit
          echo "--- Checking luarocks install paths ---"
          luarocks show luaunit 2>/dev/null || true
          find /usr/local -name "luaunit*" 2>/dev/null || true
          lua5.4 -e "print(package.path)"

      - name: Run tests
        env:
          LUA_PATH: "/usr/local/share/lua/5.1/?.lua;/usr/local/share/lua/5.1/?/init.lua;/usr/local/share/lua/5.4/?.lua;/usr/local/share/lua/5.4/?/init.lua;/usr/share/lua/5.4/?.lua;/usr/share/lua/5.4/?/init.lua;./?.lua;./?/init.lua"
          LUA_CPATH: "/usr/local/lib/lua/5.1/?.so;/usr/local/lib/lua/5.4/?.so;/usr/lib/x86_64-linux-gnu/lua/5.4/?.so;./?.so"
        run: lua5.4 tests/test_cluster_pulse.lua

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cluster-pulse .
